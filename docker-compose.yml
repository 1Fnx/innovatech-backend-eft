# =========================================================
# docker-compose.yml - Innovatech Chile
# Entorno de desarrollo local con frontend, backend y DB
# Uso:
#   docker-compose up --build
# =========================================================
version: "3.9"

services:
  # ---------- Base de Datos (MySQL) ----------
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: tienda-perritos-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-admin123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tienda_perritos}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - tienda-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-admin123}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------- Backend (Node.js + Express) ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tienda-perritos-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-admin123}
      DB_NAME: ${MYSQL_DATABASE:-tienda_perritos}
      DB_PORT: 3306
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tienda-network

# ---------- Red interna ----------
networks:
  tienda-network:
    driver: bridge

# ---------- Volumen persistente para la DB ----------
volumes:
  db_data:
    driver: local
